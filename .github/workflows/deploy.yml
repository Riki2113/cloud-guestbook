name: CI/CD Pipeline — Cloud Guestbook

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  # ── Job 1: Test & Lint ────────────────────────────────────
  test:
    name: Test & Validasi Kode
    runs-on: ubuntu-latest

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Cek syntax JavaScript
        run: node --check src/index.js

      - name: Validasi package.json
        run: node -e "require('./package.json')"

      - name: Cek file HTML ada
        run: test -f public/index.html && echo "✅ index.html ada"

  # ── Job 2: Build Docker Image ─────────────────────────────
  build:
    name: Build Docker Image
    runs-on: ubuntu-latest
    needs: test

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Setup Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (validasi Dockerfile)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: cloud-guestbook:test
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Laporan build berhasil
        run: echo "✅ Docker image berhasil di-build!"

  # ── Job 3: Deploy ke Railway ──────────────────────────────
  # ── Job 3: Deploy ke Railway ──────────────────────────────
  deploy:
    name: Deploy ke Railway
    runs-on: ubuntu-latest
    needs: [test, build]
    if: github.ref == 'refs/heads/main' && github.event_name == 'push'

    steps:
      - name: Checkout kode
        uses: actions/checkout@v4

      - name: Install Railway CLI
        run: npm install -g @railway/cli

      - name: Deploy ke Railway
        env:
          RAILWAY_TOKEN: ${{ secrets.RAILWAY_TOKEN }}
        run: railway up --detach --project f7d2e4af-af8b-4d08-896f-6cb393e989dd --service cloud-guestbook

      - name: Notifikasi deploy berhasil
        run: |
          echo "🚀 Deploy berhasil!"
          echo "Commit: ${{ github.sha }}"
          echo "Waktu : $(date)"
