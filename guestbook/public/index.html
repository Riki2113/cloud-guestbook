<!DOCTYPE html>
<html lang="id">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Cloud Guestbook — Tugas Akhir Cloud Computing</title>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    :root {
      --primary: #2563eb;
      --primary-d: #1d4ed8;
      --success: #16a34a;
      --danger: #dc2626;
      --bg: #f8fafc;
      --surface: #ffffff;
      --border: #e2e8f0;
      --text: #1e293b;
      --muted: #64748b;
      --radius: 12px;
    }

    body {
      font-family: 'Segoe UI', system-ui, sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      line-height: 1.6;
    }

    /* ── Header ── */
    header {
      background: var(--primary);
      color: #fff;
      padding: 2rem 1rem;
      text-align: center;
    }

    header h1 {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: .25rem;
    }

    header p {
      opacity: .85;
      font-size: .95rem;
    }

    .badge {
      display: inline-block;
      margin-top: .75rem;
      background: rgba(255, 255, 255, .2);
      border: 1px solid rgba(255, 255, 255, .35);
      border-radius: 999px;
      padding: .25rem .9rem;
      font-size: .78rem;
      letter-spacing: .03em;
    }

    /* ── Layout ── */
    main {
      max-width: 780px;
      margin: 2rem auto;
      padding: 0 1rem;
      display: grid;
      gap: 1.75rem;
    }

    /* ── Card ── */
    .card {
      background: var(--surface);
      border: 1px solid var(--border);
      border-radius: var(--radius);
      padding: 1.5rem;
    }

    .card h2 {
      font-size: 1.1rem;
      font-weight: 600;
      margin-bottom: 1.1rem;
      display: flex;
      align-items: center;
      gap: .5rem;
    }

    .card h2 span {
      font-size: 1.25rem;
    }

    /* ── Form ── */
    .form-grid {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: .75rem;
    }

    .form-grid .full {
      grid-column: 1 / -1;
    }

    label {
      display: block;
      font-size: .82rem;
      font-weight: 600;
      color: var(--muted);
      margin-bottom: .3rem;
      text-transform: uppercase;
      letter-spacing: .04em;
    }

    input,
    textarea {
      width: 100%;
      padding: .65rem .85rem;
      border: 1px solid var(--border);
      border-radius: 8px;
      font-size: .95rem;
      font-family: inherit;
      background: var(--bg);
      color: var(--text);
      transition: border-color .15s, box-shadow .15s;
    }

    input:focus,
    textarea:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px rgba(37, 99, 235, .12);
    }

    textarea {
      resize: vertical;
      min-height: 100px;
    }

    .char-count {
      font-size: .78rem;
      color: var(--muted);
      text-align: right;
      margin-top: .25rem;
    }

    .char-count.warn {
      color: var(--danger);
    }

    button[type="submit"] {
      width: 100%;
      margin-top: .5rem;
      padding: .75rem;
      background: var(--primary);
      color: #fff;
      border: none;
      border-radius: 8px;
      font-size: 1rem;
      font-weight: 600;
      cursor: pointer;
      transition: background .15s, transform .1s;
    }

    button[type="submit"]:hover {
      background: var(--primary-d);
    }

    button[type="submit"]:active {
      transform: scale(.98);
    }

    button[type="submit"]:disabled {
      background: var(--muted);
      cursor: not-allowed;
    }

    /* ── Toast ── */
    #toast {
      position: fixed;
      bottom: 1.5rem;
      right: 1.5rem;
      padding: .75rem 1.2rem;
      border-radius: 8px;
      color: #fff;
      font-size: .9rem;
      font-weight: 500;
      opacity: 0;
      transform: translateY(8px);
      transition: opacity .25s, transform .25s;
      z-index: 999;
      pointer-events: none;
    }

    #toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    #toast.success {
      background: var(--success);
    }

    #toast.error {
      background: var(--danger);
    }

    /* ── Stats ── */
    .stats {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: .75rem;
      margin-bottom: 1rem;
    }

    .stat {
      text-align: center;
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: .75rem .5rem;
    }

    .stat-value {
      font-size: 1.6rem;
      font-weight: 700;
      color: var(--primary);
    }

    .stat-label {
      font-size: .75rem;
      color: var(--muted);
    }

    /* ── Message list ── */
    #messages-list {
      display: grid;
      gap: .85rem;
    }

    .msg-card {
      background: var(--bg);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem 1.1rem;
      display: grid;
      grid-template-columns: 1fr auto;
      gap: .25rem .5rem;
      animation: fadeIn .3s ease;
    }

    @keyframes fadeIn {
      from {
        opacity: 0;
        transform: translateY(6px);
      }

      to {
        opacity: 1;
        transform: none;
      }
    }

    .msg-header {
      display: flex;
      align-items: center;
      gap: .6rem;
    }

    .avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: var(--primary);
      color: #fff;
      font-weight: 700;
      font-size: .9rem;
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }

    .msg-name {
      font-weight: 600;
      font-size: .95rem;
    }

    .msg-email {
      font-size: .78rem;
      color: var(--muted);
    }

    .msg-text {
      font-size: .9rem;
      line-height: 1.55;
      color: var(--text);
      grid-column: 1 / -1;
      margin-top: .3rem;
    }

    .msg-time {
      font-size: .75rem;
      color: var(--muted);
      align-self: start;
      white-space: nowrap;
    }

    .btn-delete {
      background: none;
      border: none;
      cursor: pointer;
      color: var(--muted);
      font-size: .8rem;
      padding: .2rem .4rem;
      border-radius: 4px;
      transition: color .15s, background .15s;
    }

    .btn-delete:hover {
      color: var(--danger);
      background: #fee2e2;
    }

    .empty-state {
      text-align: center;
      color: var(--muted);
      padding: 2.5rem 1rem;
      font-size: .95rem;
    }

    .empty-state .icon {
      font-size: 2.5rem;
      display: block;
      margin-bottom: .5rem;
    }

    .loading {
      display: flex;
      align-items: center;
      gap: .5rem;
      color: var(--muted);
      font-size: .9rem;
      padding: 1rem 0;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid var(--border);
      border-top-color: var(--primary);
      border-radius: 50%;
      animation: spin .7s linear infinite;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    /* ── Footer ── */
    footer {
      text-align: center;
      padding: 2rem 1rem;
      font-size: .8rem;
      color: var(--muted);
    }

    @media (max-width: 520px) {
      .form-grid {
        grid-template-columns: 1fr;
      }

      .stats {
        grid-template-columns: repeat(3, 1fr);
      }

      header h1 {
        font-size: 1.5rem;
      }
    }
  </style>
</head>

<body>

  <header>
    <h1>📋 Cloud Guestbook ☁️</h1>
    <p>Tinggalkan pesan untuk kami!</p>
  </header>

  <main>

    <!-- Form kirim pesan -->
    <section class="card">
      <h2><span>✏️</span> Tulis Pesan</h2>
      <form id="msg-form" novalidate>
        <div class="form-grid">
          <div>
            <label for="name">Nama <span style="color:var(--danger)">*</span></label>
            <input type="text" id="name" placeholder="Nama kamu" maxlength="100" required />
          </div>
          <div>
            <label for="email">Email <span style="color:var(--muted)">(opsional)</span></label>
            <input type="email" id="email" placeholder="email@contoh.com" maxlength="150" />
          </div>
          <div class="full">
            <label for="message">Pesan <span style="color:var(--danger)">*</span></label>
            <textarea id="message" placeholder="Tulis pesanmu di sini..." maxlength="1000" required></textarea>
            <div class="char-count" id="char-count">0 / 1000</div>
          </div>
        </div>
        <button type="submit" id="submit-btn">Kirim Pesan 🚀</button>
      </form>
    </section>

    <!-- Statistik -->
    <section class="card">
      <h2><span>📊</span> Statistik</h2>
      <div class="stats">
        <div class="stat">
          <div class="stat-value" id="stat-total">—</div>
          <div class="stat-label">Total Pesan</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-today">—</div>
          <div class="stat-label">Hari Ini</div>
        </div>
        <div class="stat">
          <div class="stat-value" id="stat-uptime">—</div>
          <div class="stat-label">Uptime (jam)</div>
        </div>
      </div>
    </section>

    <!-- Daftar pesan -->
    <section class="card">
      <h2><span>💬</span> Semua Pesan</h2>
      <div id="messages-list">
        <div class="loading">
          <div class="spinner"></div>
          Memuat pesan...
        </div>
      </div>
    </section>

  </main>

  <footer>
    <p>Cloud Guestbook · Tugas Akhir Cloud Computing ·</p>
    <p style="margin-top:.25rem">API: <code>/api/messages</code> · Health: <code>/api/health</code></p>
  </footer>

  <div id="toast"></div>

  <script>
    const API = '/api';

    // ── Toast ──────────────────────────────────────────
    function showToast(msg, type = 'success') {
      const t = document.getElementById('toast');
      t.textContent = msg;
      t.className = `show ${type}`;
      setTimeout(() => { t.className = ''; }, 3000);
    }

    // ── Format waktu ───────────────────────────────────
    function timeAgo(dateStr) {
      const diff = (Date.now() - new Date(dateStr)) / 1000;
      if (diff < 60) return 'baru saja';
      if (diff < 3600) return `${Math.floor(diff / 60)} mnt lalu`;
      if (diff < 86400) return `${Math.floor(diff / 3600)} jam lalu`;
      return new Date(dateStr).toLocaleDateString('id-ID', { day: 'numeric', month: 'short', year: 'numeric' });
    }

    // ── Render pesan ──────────────────────────────────
    function renderMessages(messages) {
      const container = document.getElementById('messages-list');

      // Update stats
      const today = messages.filter(m => {
        const d = new Date(m.created_at);
        const now = new Date();
        return d.toDateString() === now.toDateString();
      });
      document.getElementById('stat-total').textContent = messages.length;
      document.getElementById('stat-today').textContent = today.length;

      if (messages.length === 0) {
        container.innerHTML = `
        <div class="empty-state">
          <span class="icon">💌</span>
          Belum ada pesan. Jadilah yang pertama!
        </div>`;
        return;
      }

      container.innerHTML = messages.map(m => {
        const initial = m.name.charAt(0).toUpperCase();
        const colors = ['#2563eb', '#7c3aed', '#db2777', '#059669', '#d97706', '#dc2626'];
        const color = colors[m.name.charCodeAt(0) % colors.length];
        return `
        <div class="msg-card" id="msg-${m.id}">
          <div class="msg-header">
            <div class="avatar" style="background:${color}">${initial}</div>
            <div>
              <div class="msg-name">${escHtml(m.name)}</div>
              ${m.email ? `<div class="msg-email">${escHtml(m.email)}</div>` : ''}
            </div>
          </div>
          <div class="msg-time">${timeAgo(m.created_at)}</div>
          <div class="msg-text">${escHtml(m.message)}</div>
          <div style="grid-column:1/-1;display:flex;justify-content:flex-end;margin-top:.25rem">
            <button class="btn-delete" onclick="deleteMessage(${m.id})">🗑 hapus</button>
          </div>
        </div>`;
      }).join('');
    }

    function escHtml(str) {
      return str.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }

    // ── Load pesan ────────────────────────────────────
    async function loadMessages() {
      try {
        const res = await fetch(`${API}/messages`);
        const data = await res.json();
        if (data.success) renderMessages(data.data);
      } catch {
        document.getElementById('messages-list').innerHTML =
          '<div class="empty-state"><span class="icon">⚠️</span>Gagal memuat pesan. Cek koneksi.</div>';
      }
    }

    // ── Load health/uptime ────────────────────────────
    async function loadHealth() {
      try {
        const res = await fetch(`${API}/health`);
        const data = await res.json();
        const hours = (data.uptime / 3600).toFixed(1);
        document.getElementById('stat-uptime').textContent = hours;
      } catch { /* ignore */ }
    }

    // ── Submit pesan ──────────────────────────────────
    document.getElementById('msg-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const name = document.getElementById('name').value.trim();
      const email = document.getElementById('email').value.trim();
      const message = document.getElementById('message').value.trim();
      const btn = document.getElementById('submit-btn');

      if (!name || !message) {
        showToast('Nama dan pesan wajib diisi!', 'error');
        return;
      }

      btn.disabled = true;
      btn.textContent = 'Mengirim...';

      try {
        const res = await fetch(`${API}/messages`, {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, email, message }),
        });
        const data = await res.json();

        if (data.success) {
          showToast('✅ Pesan berhasil dikirim!');
          e.target.reset();
          document.getElementById('char-count').textContent = '0 / 1000';
          await loadMessages();
        } else {
          showToast(data.error || 'Gagal mengirim pesan', 'error');
        }
      } catch {
        showToast('Gagal terhubung ke server', 'error');
      } finally {
        btn.disabled = false;
        btn.textContent = 'Kirim Pesan 🚀';
      }
    });

    // ── Hapus pesan ───────────────────────────────────
    async function deleteMessage(id) {
      if (!confirm('Hapus pesan ini?')) return;
      try {
        await fetch(`${API}/messages/${id}`, { method: 'DELETE' });
        document.getElementById(`msg-${id}`)?.remove();
        showToast('Pesan dihapus');
        loadMessages();
      } catch {
        showToast('Gagal menghapus', 'error');
      }
    }

    // ── Char counter ──────────────────────────────────
    document.getElementById('message').addEventListener('input', function () {
      const el = document.getElementById('char-count');
      const n = this.value.length;
      el.textContent = `${n} / 1000`;
      el.className = `char-count${n > 900 ? ' warn' : ''}`;
    });

    // ── Init ──────────────────────────────────────────
    loadMessages();
    loadHealth();
    setInterval(loadMessages, 30000);
  </script>
</body>

</html>
